name: Deploy Frontend To AWS

on:
  push:
    branches:
      - main
      - asset
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-aws-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || vars.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || vars.S3_SECRET_KEY }}
      S3_REGION: ${{ secrets.S3_REGION || vars.S3_REGION }}
      S3BUCKET: ${{ secrets.S3BUCKET || vars.S3BUCKET }}
      DISTRIBUTION: ${{ secrets.DISTRIBUTION || vars.DISTRIBUTION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate source branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" && "${GITHUB_REF_NAME}" != "asset" ]]; then
            echo "::error::Only main and asset branches are allowed for deployment."
            exit 1
          fi

      - name: Ensure latest remote tip is checked out
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune
          target="origin/${GITHUB_REF_NAME}"
          if ! git rev-parse --verify "${target}" >/dev/null 2>&1; then
            echo "::error::Could not find remote branch ${target}."
            exit 1
          fi
          head_sha="$(git rev-parse HEAD)"
          target_sha="$(git rev-parse "${target}")"
          if [[ "${head_sha}" != "${target_sha}" ]]; then
            echo "::error::HEAD (${head_sha}) is not the latest commit of ${target} (${target_sha})."
            exit 1
          fi

      - name: Validate required deployment environment variables
        shell: bash
        run: |
          set -euo pipefail
          required=(S3_ACCESS_KEY S3_SECRET_KEY S3_REGION S3BUCKET DISTRIBUTION)
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required variable: ${key}"
              exit 1
            fi
          done

      - name: Detect lockfile
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node.js (with npm cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Node.js (without cache)
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build production bundle
        shell: bash
        run: |
          set -euo pipefail
          npm run build -- --configuration production --no-progress

      - name: Resolve dist output path
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "dist/ralbatech-website/browser"
            "dist/multikart/browser"
            "dist/ralbatech-website"
            "dist/multikart"
          )
          for candidate in "${candidates[@]}"; do
            if [[ -d "${candidate}" && -f "${candidate}/index.html" ]]; then
              echo "path=${candidate}" >> "${GITHUB_OUTPUT}"
              echo "Using dist path: ${candidate}"
              exit 0
            fi
          done
          echo "::error::Could not find built index.html in expected dist directories."
          exit 1

      - name: Verify build references to prevent 404 chunk errors
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-dist-assets.js "${{ steps.dist.outputs.path }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ env.S3_SECRET_KEY }}
          aws-region: ${{ env.S3_REGION }}

      - name: AWS preflight checks (401/403/404 protection)
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null
          aws s3api head-bucket --bucket "${S3BUCKET}" >/dev/null

          cf_status="$(aws cloudfront get-distribution --id "${DISTRIBUTION}" --query 'Distribution.Status' --output text)"
          cf_origins="$(aws cloudfront get-distribution --id "${DISTRIBUTION}" --query 'Distribution.DistributionConfig.Origins.Items[].DomainName' --output text)"
          echo "CloudFront status: ${cf_status}"
          echo "CloudFront origins: ${cf_origins}"

          if [[ "${cf_origins}" != *"${S3BUCKET}"* ]]; then
            echo "::error::CloudFront distribution ${DISTRIBUTION} does not point to bucket ${S3BUCKET}."
            echo "::error::Update DISTRIBUTION or S3BUCKET env values before deploy."
            exit 1
          fi

      - name: Upload static assets to S3 with immutable cache headers
        shell: bash
        run: |
          set -euo pipefail
          dist_path="${{ steps.dist.outputs.path }}"
          aws s3 sync "${dist_path}" "s3://${S3BUCKET}" \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html with no-cache headers
        shell: bash
        run: |
          set -euo pipefail
          dist_path="${{ steps.dist.outputs.path }}"
          aws s3 cp "${dist_path}/index.html" "s3://${S3BUCKET}/index.html" \
            --cache-control "no-store,no-cache,must-revalidate,max-age=0" \
            --content-type "text/html; charset=utf-8"

      - name: Validate uploaded core objects in S3
        shell: bash
        run: |
          set -euo pipefail
          dist_path="${{ steps.dist.outputs.path }}"
          while IFS= read -r -d '' file; do
            key="${file#${dist_path}/}"
            aws s3api head-object --bucket "${S3BUCKET}" --key "${key}" >/dev/null
          done < <(find "${dist_path}" -maxdepth 1 -type f \( -name "index.html" -o -name "*.js" -o -name "*.css" \) -print0)

      - name: Create CloudFront invalidation
        id: invalidation
        shell: bash
        run: |
          set -euo pipefail
          invalidation_id="$(aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)"
          echo "id=${invalidation_id}" >> "${GITHUB_OUTPUT}"
          echo "Invalidation ID: ${invalidation_id}"

      - name: Wait for CloudFront invalidation completion
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront wait invalidation-completed \
            --distribution-id "${DISTRIBUTION}" \
            --id "${{ steps.invalidation.outputs.id }}"
