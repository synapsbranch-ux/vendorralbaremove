<header class="sticky" [ngClass]="class" [class.fixed]="stick && sticky">
  <div class="mobile-fix-option"></div>
  <div class="container">
    <div class="row">
      <div class="col-sm-12">
        <div class="main-menu">
          <div class="menu-left">
            <!-- <app-left-menu></app-left-menu> -->
            <div class="brand-logo">
              <a routerLink="/" id="headerlogo">
                <img [src]="themeLogo" class="img-fluid" alt="logo">
              </a>
            </div>
          </div>
          <div class="menu-center">
            <a class="btn btn-solid rounded-lg virtual_btn" href="https://store.ralbatech.com/?d_id=61de82f9292a1d59a1a30de6&v_id=615ac800c81beb34a2484f67" target="_blank" >VIRTUAL STUDIO</a>
            <!-- <a class="btn btn-solid rounded-lg virtual_btn" [routerLink]="['/pages/3dstore']" routerLinkActive="router-link-active"  >VIRTUAL STUDIO</a> -->
            <form class="ml-3">
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="fa fa-search" aria-hidden="true"></i></span>
                </div>
                <input type="text" class="form-control" placeholder="Search for products, brands and more">
              </div>
            </form>
          </div>
          
          <div class="menu-right pull-right">
            <div>
              <!-- <app-menu></app-menu> -->
            </div>
            <div>
              <app-settings></app-settings>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-header">
    <div class="container">
      <div class="row">
        <div class="col-12">
            <app-menu></app-menu>
        </div>
      </div>
    </div>
  </div>
  
</header>
