<owl-carousel-o [options]="LogoSliderConfig" class="no-arrow">
  <ng-container *ngFor="let brand of brands">
    <ng-template carouselSlide>
      <div>
        <div class="logo-block">
          <a (click)="viewResults(brand._id)" class="pe-auto">
            <img src="assets/images/brands/{{brand.brand_slug}}.png" alt="brand" class="w-95">
          </a>
        </div>
      </div>
    </ng-template>
  </ng-container>
</owl-carousel-o>
