<!-- section start -->
<section class="login-page section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <h3>Login</h3>
                <div class="theme-card">
                    <form class="theme-form" [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label for="lemail">Email / Phone Number</label>
                            <input type="text" class="form-control" id="lemail" placeholder="Email" required="" formControlName="lemail">
                            <div *ngIf="lemail.invalid && (lemail.dirty || lemail.touched)" class="text text-danger">
                                <div *ngIf="lemail.errors?.required">
                                    Email is required.
                                </div>
                                <div *ngIf="lemail.errors?.email">
                                    Please enter a valid email.
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="lpassword">Password</label>
                            <input type="password" class="form-control" id="lpassword" placeholder="Enter your password" required="" formControlName="lpassword">
                            <div *ngIf="lpassword.invalid && (lpassword.dirty || lpassword.touched)" class="text text-danger">
                                <div *ngIf="lpassword.errors?.required">
                                    Password is required.
                                </div>
                            </div>
                        </div>
                        <p class="m-0 float-right"><a [routerLink]="['/pages/forget/password']">Forget Password</a></p>
                        <button type="submit" class="btn btn-solid rounded-lg">Login</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6 right-login">
                <h3>New Customer</h3>
                <div class="theme-card authentication-right">
                    <h6 class="title-font">Create A Account</h6>
                    <p>Sign up for a free account at our store. Registration is quick and easy. It allows you to be able to order from our shop. To start shopping click register.</p>
                    <a [routerLink]="['/pages/register']"><button class="btn btn-solid rounded-lg">Create an Account</button></a>
                </div>
            </div>
        </div>
    </div>
</section>
<!--Section ends-->
