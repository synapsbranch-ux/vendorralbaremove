<section class="section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-3">
                <div class="account-sidebar" (click)="ToggleDashboard()">
                    <a hre="javascript:void(0)" class="popup-btn">
                        my account
                    </a>
                </div>
                <div class="dashboard-left" [class.open]="openDashboard">
                    <div class="collection-mobile-back" (click)="ToggleDashboard()">
                        <span class="filter-back">
                            <i class="fa fa-angle-left" aria-hidden="true"></i> back
                        </span>
                    </div>
                    <div class="block-content">
                        <ul>
                            <li ><a [routerLink]="['/dashboard']">My Account</a></li>
                            <li><a [routerLink]="['/address']">Address Book</a></li>
                            <li class="active"><a [routerLink]="['/change-password']">Change Password</a></li>
                            <li class="last"><a (click)="logout()">Log Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
<!-- CHANGE PASSWORD -->
<div class="col-lg-9 contact-page register-page">
    <div class="dashboard-right">
        <div class="dashboard">
            <div class="box-account box-info">
                <div class="box-head mb-3">
                    <h2>Change Password</h2>
                </div>
                <div>
                    <div class="box">
                        <div class="row">
                            <div class="col-sm-12">
                                <form class="theme-form">
                                    <div class="form-row">
                                        <div class="col-md-12">
                                            <label for="old-password">Old Password</label>
                                            <input type="password" class="form-control" id="old-password" placeholder="Enter Your Old Password" required="">
                                        </div>
                                        <div class="col-md-12">
                                            <label for="new-password">New Password</label>
                                            <input type="password" class="form-control" id="new-password" placeholder="Enter Your New Password" required="">
                                        </div>
                                        <div class="col-md-12">
                                            <label for="confirm-password">Confirm Password</label>
                                            <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Password" required="">
                                        </div>
                                        <div class="col-md-12">
                                            <button class="btn btn-sm btn-solid rounded-lg" type="submit">Save setting</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        </div>
    </div>
</section>
