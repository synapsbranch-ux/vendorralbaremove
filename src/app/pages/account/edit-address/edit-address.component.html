<!-- <app-breadcrumb [title]="'Dashboard'" [breadcrumb]="'Dashboard'"></app-breadcrumb> -->

<section class="section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-3">
                <div class="account-sidebar" (click)="ToggleDashboard()">
                    <a hre="javascript:void(0)" class="popup-btn">
                        my account
                    </a>
                </div>
                <div class="dashboard-left" [class.open]="openDashboard">
                    <div class="collection-mobile-back" (click)="ToggleDashboard()">
                        <span class="filter-back">
                            <i class="fa fa-angle-left" aria-hidden="true"></i> back
                        </span>
                    </div>
                    <div class="block-content">
                        <ul>
                            <li><a [routerLink]="['/dashboard']">My Account</a></li>
                            <li class="active"><a [routerLink]="['/address']">Address Book</a></li>
                            <li><a [routerLink]="['/order-list']">Order List</a></li>
                            <li><a [routerLink]="['/change-password']">Change Password</a></li>
                            <li class="last"><a (click)="logout()">Log Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <!-- MANAGE ADDRESS -->
            <div class="col-lg-9">
                <div class="dashboard-right">
                    <div class="dashboard">
                        <div class="box-account box-info">
                            <div>
                                <div class="box mt-3">
                                    <div class="box-title">
                                        <h3>{{addressMassage}}</h3>
                                    </div>
                                    <div class="contact-page register-page">
                                        <form class="theme-form" [formGroup]="form" (ngSubmit)="onSubmit()">
                                            <input type="hidden" formControlName="defaultstatus" [(ngModel)]="is_defaultval">
                                            <div class="form-row">
                                                <div class="col-md-12">
                                                    <label for="addressline1">Name *</label>
                                                    <input type="text" class="form-control" id="name" [(ngModel)]="fullname" placeholder="Name" formControlName="userfullname">
                                                </div>
                                                <div class="col-md-12">
                                                    <label for="addressline1">Address Line 1 *</label>
                                                    <input type="text" class="form-control" id="addressline1" [(ngModel)]="address1" placeholder="Address" formControlName="addressline1">
                                                </div>
                                                <div class="col-md-12">
                                                    <label for="addressline2">Address Line 2</label>
                                                    <input type="text" class="form-control" id="addressline2" [(ngModel)]="address2" placeholder="Address" formControlName="addressline2">
                                                </div>
                                                <div class="col-md-6">
                                                    <label for="city">City *</label>
                                                    <input type="text" class="form-control" id="city" placeholder="City" [(ngModel)]="cityname" formControlName="city">
                                                </div>
                                                <div class="col-md-6">
                                                    <label for="state">State *</label>
                                                    <input type="text" class="form-control" id="state" placeholder="State" [(ngModel)]="statename" formControlName="state">
                                                </div>
                                                <div class="col-md-6">
                                                    <label for="postal_code">Postal Code *</label>
                                                    <input type="text" class="form-control" id="postal_code" placeholder="Postal code" [(ngModel)]="postal_code" formControlName="postalCode">
                                                </div>
                                                <div class="col-md-6">
                                                    <label for="telephone">Telephone </label>
                                                    <input type="text" class="form-control" id="telephone" placeholder="Telephone" [(ngModel)]="telephone_num" formControlName="telephone">
                                                </div>
                                                <div class="col-md-12">
                                                    <button class="btn btn-sm btn-solid rounded-lg" type="submit">Save Address</button>
                                                </div>
                                                <div [className]="isValid ? 'alert mt-3 alert-success' : 'alert mt-3 alert-danger'" role="alert" *ngIf="isValid">
                                                    <div class="d-flex align-items-center"><span *ngIf="isValid"><i class="fa fa-spinner fa-spin" style="font-size:24px"></i> &nbsp;</span>{{submitMassage}}</div>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
